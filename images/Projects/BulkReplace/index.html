<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bulk Replace</title>
    
    <link rel="icon" type="image/png" href="download.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            animation: blobMove 20s ease-in-out infinite;
        }
        
        .bg-animation::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: starsTwinkle 3s ease-in-out infinite alternate;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes blobMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        @keyframes starsTwinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        
        .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 6px; height: 6px; }
        .particle:nth-child(2) { left: 20%; animation-duration: 15s; animation-delay: 1s; }
        .particle:nth-child(3) { left: 30%; animation-duration: 10s; animation-delay: 2s; width: 8px; height: 8px; }
        .particle:nth-child(4) { left: 40%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(5) { left: 50%; animation-duration: 14s; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(6) { left: 60%; animation-duration: 11s; animation-delay: 1s; }
        .particle:nth-child(7) { left: 70%; animation-duration: 16s; animation-delay: 2s; width: 7px; height: 7px; }
        .particle:nth-child(8) { left: 80%; animation-duration: 13s; animation-delay: 0s; }
        .particle:nth-child(9) { left: 90%; animation-duration: 17s; animation-delay: 4s; width: 4px; height: 4px; }
        .particle:nth-child(10) { left: 15%; animation-duration: 19s; animation-delay: 2s; width: 6px; height: 6px; }
        .particle:nth-child(11) { left: 25%; animation-duration: 12s; animation-delay: 5s; }
        .particle:nth-child(12) { left: 35%; animation-duration: 14s; animation-delay: 1s; width: 5px; height: 5px; }
        .particle:nth-child(13) { left: 45%; animation-duration: 16s; animation-delay: 3s; }
        .particle:nth-child(14) { left: 55%; animation-duration: 11s; animation-delay: 0s; width: 8px; height: 8px; }
        .particle:nth-child(15) { left: 65%; animation-duration: 18s; animation-delay: 2s; }
        .particle:nth-child(16) { left: 75%; animation-duration: 13s; animation-delay: 4s; width: 6px; height: 6px; }
        .particle:nth-child(17) { left: 85%; animation-duration: 15s; animation-delay: 1s; }
        .particle:nth-child(18) { left: 5%; animation-duration: 20s; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(19) { left: 95%; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(20) { left: 50%; animation-duration: 17s; animation-delay: 5s; width: 7px; height: 7px; }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .container {
            background: rgba(30, 30, 60, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(120, 119, 198, 0.2);
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: containerPulse 4s ease-in-out infinite;
        }
        
        @keyframes containerPulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(120, 119, 198, 0.2); }
            50% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 40px rgba(120, 119, 198, 0.4); }
        }
        
        h1 {
            text-align: center;
            color: #a78bfa;
            margin-top: 0;
            letter-spacing: 2px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            0% { text-shadow: 0 0 20px rgba(167, 139, 250, 0.5); }
            100% { text-shadow: 0 0 40px rgba(167, 139, 250, 0.8), 0 0 60px rgba(167, 139, 250, 0.4); }
        }
        
        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
            margin-bottom: 5px;
            color: #c4b5fd;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            background: rgba(20, 20, 40, 0.6);
            color: #e0e0e0;
        }
        
        textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);
            background: rgba(20, 20, 40, 0.8);
        }
        
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .controls > div {
            flex: 1;
        }
        
        button {
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }
        
        button:active {
            transform: scale(0.98) translateY(0);
        }
        
        .output-section {
            margin-top: 25px;
            border-top: 2px dashed rgba(167, 139, 250, 0.3);
            padding-top: 20px;
        }
        
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            width: auto;
            margin-top: 0;
        }
        
        .copy-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }
        
        .copy-btn:active {
            transform: scale(0.95);
        }
        
        .copy-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        
        .copy-btn.copied {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 30, 60, 0.9);
            backdrop-filter: blur(10px);
            color: #34d399;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid rgba(52, 211, 153, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast svg {
            width: 20px;
            height: 20px;
            fill: #34d399;
        }
        
        .watermark {
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
            color: rgba(167, 139, 250, 0.6);
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Custom scrollbar */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        
        textarea::-webkit-scrollbar-track {
            background: rgba(20, 20, 40, 0.3);
            border-radius: 10px;
        }
        
        textarea::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #7c3aed, #a78bfa);
            border-radius: 10px;
        }
        
        textarea::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #6d28d9, #8b5cf6);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            h1 {
                font-size: 1.8em;
            }
            .output-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">
    <h1>Bulk Replace</h1>
    
    <label for="mainText">1. Paste your full text here:</label>
    <textarea id="mainText" rows="10" placeholder="Paste the entire document or long text here..."></textarea>

    <div class="controls">
        <div>
            <label for="findText">2. Text to Find:</label>
            <textarea id="findText" rows="6" placeholder="Paste the text you want to find..."></textarea>
        </div>
        <div>
            <label for="replaceText">3. Replace With:</label>
            <textarea id="replaceText" rows="6" placeholder="Paste the new text here..."></textarea>
        </div>
    </div>

    <button onclick="performReplace()">Replace All Matches</button>

    <div class="output-section">
        <div class="output-header">
            <label for="outputText">Result:</label>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                <span id="copyBtnText">Copy to Clipboard</span>
            </button>
        </div>
        <textarea id="outputText" rows="10" placeholder="Your modified text will appear here..." readonly style="background-color: rgba(20, 20, 40, 0.8);"></textarea>
    </div>
</div>

<div class="watermark">
    &copy; 2026 Made by Vincent
</div>

<div class="toast" id="toast">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    <span>Copied to clipboard!</span>
</div>

<script>
    function performReplace() {
        const mainText = document.getElementById('mainText').value;
        const findText = document.getElementById('findText').value;
        const replaceText = document.getElementById('replaceText').value;

        if (!findText) {
            alert("Please enter the text you want to find.");
            return;
        }

        const resultText = mainText.split(findText).join(replaceText);
        document.getElementById('outputText').value = resultText;
        
        if (mainText === resultText && mainText !== "") {
            alert("No matches found! Check for exact matching.");
        }
    }
    
    async function copyToClipboard() {
        const outputText = document.getElementById('outputText').value;
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnText = document.getElementById('copyBtnText');
        const toast = document.getElementById('toast');
        
        if (!outputText) {
            showToast('Nothing to copy!', '#ef4444');
            return;
        }
        
        try {
            await navigator.clipboard.writeText(outputText);
            
            // Change button state
            copyBtn.classList.add('copied');
            copyBtnText.textContent = 'Copied!';
            
            // Show toast
            showToast('Copied to clipboard!', '#34d399');
            
            // Reset button after 2 seconds
            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtnText.textContent = 'Copy to Clipboard';
            }, 2000);
            
        } catch (err) {
            // Fallback for older browsers
            const textArea = document.createElement('textarea');
            textArea.value = outputText;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                copyBtn.classList.add('copied');
                copyBtnText.textContent = 'Copied!';
                showToast('Copied to clipboard!', '#34d399');
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtnText.textContent = 'Copy to Clipboard';
                }, 2000);
            } catch (err) {
                showToast('Failed to copy!', '#ef4444');
            }
            
            document.body.removeChild(textArea);
        }
    }
    
    function showToast(message, color) {
        const toast = document.getElementById('toast');
        const toastSpan = toast.querySelector('span');
        const toastSvg = toast.querySelector('svg');
        
        toastSpan.textContent = message;
        toast.style.color = color;
        toast.style.borderColor = color + '4D';
        toastSvg.style.fill = color;
        
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }
</script>

</body>
</html>
