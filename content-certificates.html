<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates & Awards - Vincent's Portfolio</title>
</head>
<body>

<!-- Header -->
<div class="text-center mb-12">
    <h1 class="text-4xl md:text-5xl font-bold mb-4">
        Certificates & <span class="gradient-text">Awards</span>
    </h1>
    <div class="w-24 h-1 bg-gradient-to-r from-blue-500 to-purple-600 mx-auto mb-6"></div>
    <p class="max-w-2xl mx-auto text-gray-600 dark:text-gray-300 text-lg">
        A collection of my professional certifications and achievements across various technology domains
    </p>
</div>

<!-- Tab Navigation -->
<div class="flex flex-wrap justify-center gap-3 mb-10">
    <button data-category="networking"
        class="tab-btn active px-6 py-3 rounded-full font-medium flex items-center gap-2 bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-lg">
        <i class="fas fa-network-wired"></i>
        <span>Networking</span>
    </button>
    <button data-category="cybersecurity"
        class="tab-btn px-6 py-3 rounded-full font-medium flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-shield-alt"></i>
        <span>Cybersecurity</span>
    </button>
    <button data-category="ai"
        class="tab-btn px-6 py-3 rounded-full font-medium flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-brain"></i>
        <span>Artificial Intelligence</span>
    </button>
    <button data-category="multimedia"
        class="tab-btn px-6 py-3 rounded-full font-medium flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-photo-video"></i>
        <span>Multimedia</span>
    </button>
    <button data-category="microsoft"
        class="tab-btn px-6 py-3 rounded-full font-medium flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fab fa-microsoft"></i>
        <span>Microsoft</span>
    </button>
</div>

<!-- Certificate Count -->
<div class="text-center mb-8">
    <span id="cert-count"
        class="inline-block px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded-full text-sm font-medium text-gray-600 dark:text-gray-400">
        9 Certificates
    </span>
</div>

<!-- Certificates Grid -->
<div id="certificates-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Certificates will be dynamically inserted here -->
</div>

</body>
</html>
